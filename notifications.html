<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications - Flood Guard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <nav class="top-nav">
        <div class="nav-left">
          <a class="nav-tab" href="index.html">Home</a>
          <a class="nav-tab" href="flood-reports.html">Flood Photo Reports</a>
          <a class="nav-tab" href="news.html">Flood News</a>
          <a class="nav-tab" href="about.html">About the App</a>
        </div>
        <div class="top-right-menu">
          <div class="quick-menu">
            <button id="top-menu-button" class="menu-icon-btn" type="button">☰</button>
            <div id="top-menu-dropdown" class="menu-dropdown hidden" role="menu">
              <a href="settings.html" role="menuitem" class="menu-item">Settings</a>
              <a href="notifications.html" role="menuitem" class="menu-item">Notifications</a>
              <a href="saved-alerts.html" role="menuitem" class="menu-item">Saved Alerts</a>
              <a href="help-support.html" role="menuitem" class="menu-item">Help & Support</a>
              <a href="about.html" role="menuitem" class="menu-item">About App</a>
            </div>
          </div>
        </div>
      </nav>

      <header class="hero">
        <p class="eyebrow">Alerts</p>
        <h1>Notifications</h1>
      </header>

      <section class="media-report-panel">
        <form class="report-form">
          <label><input type="checkbox" checked /> Enable flood alerts</label>
          <label><input type="checkbox" checked /> Notify for High risk only</label>
          <label><input type="checkbox" /> Notify for Moderate and High risk</label>
          <label><input type="checkbox" checked /> Emergency-only alerts during quiet hours</label>
          <label for="quiet-hours">Quiet Hours</label>
          <input id="quiet-hours" type="text" value="10:00 PM - 6:00 AM" />
          <button type="button" class="btn btn-primary">Update Notifications</button>
        </form>
      </section>

      <section class="photo-list-panel">
        <h3>Recent Alert History</h3>
        <div class="report-list">
          <article class="report-item">
            <p class="report-headline">Accra - Odaw Basin</p>
            <p class="report-time">High Flood Risk | 12 minutes ago</p>
          </article>
          <article class="report-item">
            <p class="report-headline">Keta</p>
            <p class="report-time">High Flood Risk | 34 minutes ago</p>
          </article>
        </div>
      </section>
    </main>
    <script src="top-menu.js"></script>
  </body>
</html>
